# AlmaLinux 9 Golden Image Kickstart
# Minimal unattended install for Packer template builds
#
# Ref: https://docs.redhat.com/en/documentation/red_hat_enterprise_linux/9/html/automatically_installing_rhel/kickstart-commands-and-options-reference_rhel-installer
# Ref: https://wiki.almalinux.org/documentation/kickstart-guide.html
# Validate with: ksvalidator -v RHEL9 ks.cfg

# Install mode — fully non-interactive
text
skipx
eula --agreed
firstboot --disable

# Localization
lang en_US.UTF-8
keyboard us
timezone UTC --utc
# RHEL 9 timesource syntax (replaces deprecated timezone --ntpservers)
timesource --ntp-server=pool.ntp.org

# Network — DHCP during build (on vmbr0)
network --bootproto=dhcp --device=link --activate --onboot=yes

# Temporary root password — Packer uses this for SSH access during build
# The provisioning script locks root and disables password auth afterward
rootpw --plaintext packer

# Partitioning
clearpart --all --initlabel
autopart --type=lvm

# Bootloader
bootloader --append="crashkernel=no"

# SELinux
selinux --enforcing

# Firewall — allow SSH for Packer connectivity, keep tight otherwise
firewall --enabled --ssh

# Services
services --enabled=sshd

# Minimal package set — additional packages installed by provisioning script
%packages --ignoremissing
@^minimal-environment
%end

# Post-install
%post --log=/root/ks-post.log
# Allow Packer to SSH in as root with a password.
# AlmaLinux 9 defaults to PermitRootLogin prohibit-password — must override.
# provision.sh hardens this back (no root login, no passwords) after build.
sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config

# qemu-guest-agent is not on the minimal ISO so it can't go in %packages.
# Install here via dnf (network is up at this point) so Proxmox can report
# the VM's IP to Packer before it tries to SSH in.
dnf install -y qemu-guest-agent
systemctl enable sshd
systemctl enable qemu-guest-agent
%end

# Reboot when done so Packer can SSH in
reboot
