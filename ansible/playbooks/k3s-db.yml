---
- name: Deploy PostgreSQL for k3s
  hosts: k3s_db
  become: true
  vars:
    k3s_db_name: k3s
    k3s_db_user: k3s
    k3s_db_password: "{{ lookup('env', 'K3S_DB_PASSWORD') }}"
  tasks:
    - name: Validate password is set
      ansible.builtin.assert:
        that: k3s_db_password | length > 0
        fail_msg: "Set K3S_DB_PASSWORD in .envrc"

    - name: Install PostgreSQL
      ansible.builtin.dnf:
        name:
          - postgresql-server
          - postgresql
        state: present

    - name: Check if initialized
      ansible.builtin.stat:
        path: /var/lib/pgsql/data/PG_VERSION
      register: pg_init

    - name: Initialize database
      ansible.builtin.command: postgresql-setup --initdb
      when: not pg_init.stat.exists

    - name: Start and enable PostgreSQL
      ansible.builtin.systemd:
        name: postgresql
        state: started
        enabled: true

    - name: Listen on all interfaces
      ansible.builtin.lineinfile:
        path: /var/lib/pgsql/data/postgresql.conf
        regexp: "^#?listen_addresses"
        line: "listen_addresses = '*'"
      register: pg_conf

    - name: Allow k3s subnet to connect
      ansible.builtin.lineinfile:
        path: /var/lib/pgsql/data/pg_hba.conf
        insertafter: "^# IPv4 local connections"
        line: "host    {{ k3s_db_name }}    {{ k3s_db_user }}    10.10.0.0/24    scram-sha-256"
      register: pg_hba

    - name: Create k3s user
      become_user: postgres
      ansible.builtin.command: >
        psql -c "DO $$ BEGIN
          IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '{{ k3s_db_user }}') THEN
            CREATE ROLE {{ k3s_db_user }} LOGIN PASSWORD '{{ k3s_db_password }}';
          END IF;
        END $$;"
      changed_when: false

    - name: Create k3s database
      become_user: postgres
      ansible.builtin.command: >
        psql -c "SELECT 1 FROM pg_database WHERE datname = '{{ k3s_db_name }}'"
      register: db_exists
      changed_when: false

    - name: Create database if not exists
      become_user: postgres
      ansible.builtin.command: >
        psql -c "CREATE DATABASE {{ k3s_db_name }} OWNER {{ k3s_db_user }};"
      when: "db_exists.stdout.find('1') == -1"

    - name: Restart PostgreSQL if config changed
      ansible.builtin.systemd:
        name: postgresql
        state: restarted
      when: pg_conf.changed or pg_hba.changed

    - name: Open PostgreSQL port
      ansible.posix.firewalld:
        port: 5432/tcp
        state: enabled
        permanent: true
        immediate: true
