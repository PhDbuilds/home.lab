---
- name: Apply base hardening to all hosts
  hosts: all
  become: true

  roles:
    # devsec.hardening — OS-level hardening
    # Covers: sysctl, filesystem permissions, user/group settings,
    # SUID/SGID cleanup, kernel module blacklisting, SELinux, login.defs
    # Ref: https://github.com/dev-sec/ansible-collection-hardening/tree/master/roles/os_hardening
    - role: devsec.hardening.os_hardening

    # devsec.hardening — SSH hardening
    # Covers: cipher suites, MACs, KEX algorithms, root login, auth methods,
    # forwarding, banner, client/server config
    # Ref: https://github.com/dev-sec/ansible-collection-hardening/tree/master/roles/ssh_hardening
    - role: devsec.hardening.ssh_hardening

    # Lab-specific hardening that devsec doesn't cover
    - role: basehardening
